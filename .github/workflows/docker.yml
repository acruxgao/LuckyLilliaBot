name: Build and Push LLOneBot Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the Docker image'
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 不再需要登录 Docker Hub，已移除 login 步骤

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version=${version#v}
          else
            input_version="${{ github.event.inputs.version }}"
            if [ -n "$input_version" ] && [ "$input_version" != "" ]; then
              version="$input_version"
            else
              latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
              if [ -n "$latest_tag" ]; then
                version=${latest_tag#v}
              else
                version="5.8.0"
              fi
            fi
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build Docker images and export to tar.gz
        run: |
          version="${{ steps.version.outputs.version }}"
          platforms="linux/amd64 linux/arm64 linux/arm/v7"
          for platform in $platforms; do
            # 平台名中的 / 替换为 - 用于文件名
            platform_clean=$(echo "$platform" | tr '/' '-')
            echo "🔨 Building for $platform..."
            docker buildx build \
              --platform "$platform" \
              --build-arg LLBOT_VERSION="$version" \
              -t "llbot:$version-${platform_clean}" \
              -f docker/Dockerfile \
              --output type=tar,dest="llbot-$version-${platform_clean}.tar" \
              .
            gzip "llbot-$version-${platform_clean}.tar"
            echo "✅ Created llbot-$version-${platform_clean}.tar.gz"
          done

      - name: Upload images to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: llbot-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload images as workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: llbot-docker-images-${{ steps.version.outputs.version }}
          path: llbot-*.tar.gz
          retention-days: 7

      - name: Output summary
        run: |
          echo "✅ Built Docker images for linux/amd64, linux/arm64, linux/arm/v7"
          echo "📦 Files generated:"
          ls -lh llbot-*.tar.gz
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "⬆️ Uploaded to the Release assets of this tag"
          else
            echo "⬆️ Uploaded to the workflow Artifacts (download from Actions page)"
          fi
